# ============================================
# Cash Clash Configuration
# ============================================

# Enable debug mode (logs detailed info to console)
debug: false

# ============================================
# GAME SETTINGS
# ============================================
game:
  # Player counts
  min-players: 8
  max-players: 8

  # Round configuration
  total-rounds: 7
  first-round: 1

  # Phase durations (seconds)
  combat-phase-duration: 360
  shopping-phase-duration: 90
  first-round-shopping-duration: 120

  # Respawn settings
  respawn-delay: 5
  respawn-protection: 5

  # Forfeit settings
  forfeit-enabled: true
  forfeit-delay: 10
  forfeit-combat-grace: 5

# ============================================
# ROUND SETTINGS
# ============================================
rounds:
  # Lives per round
  early-round-lives: 3
  late-round-lives: 1

  # Forfeit bonus
  forfeit-bonus: 10000

# ============================================
# ARMOR RESTRICTIONS
# ============================================
armor:
  # Round at which diamond armor becomes unlimited
  diamond-unlock-round: 4
  # Maximum diamond pieces before unlock round
  max-diamond-pieces-early: 2

# ============================================
# ECONOMY SETTINGS
# ============================================
economy:
  # Starting/bonus money per round
  round-1-start: 10000
  round-2-bonus: 30000
  round-3-bonus: 50000
  round-4-bonus: 100000
  round-5-minimum: 20000
  round-5-bonus: 10000

  # Kill rewards
  round-1-kill-reward: 3000

  # Transfer fees (percentage, 0.5 = 50%)
  round-1-transfer-fee: 0.50
  round-2-3-transfer-fee: 0.10
  round-4-5-transfer-fee: 0.05

  # Percentage steal for rounds 4-5
  late-round-steal-percentage: 0.25

# ============================================
# CASH QUAKE EVENTS
# ============================================
cash-quake:
  # Event limits
  min-guaranteed-events: 2
  max-events-per-game: 10
  max-events-per-round: 2

  # Event timing (ticks, 600 = 30 seconds)
  event-check-interval-ticks: 600
  # Base chance for event trigger (0.30 = 30%)
  event-base-chance: 0.30

  # Lottery event
  lottery:
    entry-cost: 5000
    prize: 10000
    duration-seconds: 30

  # Weight of Wealth event
  weight-of-wealth:
    tax-cost: 5000
    duration-seconds: 20

  # Life Steal event
  life-steal:
    duration-minutes: 2
    health-per-kill: 4.0
    max-health: 40.0

  # Check Up event
  check-up:
    duration-minutes: 2
    min-hearts: 1
    max-hearts: 5

  # Broken Gear event
  broken-gear:
    duration-seconds: 30

  # Supply Drop event
  supply-drop:
    min-chests: 3
    max-extra-chests: 4
    min-coins: 1000
    max-extra-coins: 1001

# ============================================
# PLAYER DEFAULTS
# ============================================
player:
  default-health: 20.0
  max-health-cap: 40.0

# ============================================
# GAMEMODE SETTINGS
# ============================================
gamemodes:
  # Capture the Flag settings
  capture-the-flag:
    # Time required to stand on capture plate (milliseconds)
    plate-activation-time-ms: 3000
    # Win conditions
    normal-captures-to-win: 2
    sudden-death-captures-to-win: 4
    # Capture bonus (awarded at 45 seconds)
    capture-bonus-coins: 15000
    # Bonus timer (milliseconds)
    capture-bonus-timer-ms: 45000


# ============================================
# SCOREBOARD CONFIGURATION
# ============================================
# Available placeholders for all scoreboards:
# - {round} = Current round number
# - {state} / {phase} = Current game phase (Shopping, Combat, Waiting, Ending)
# - {phase_number} = Phase number
# - {time} = Time remaining (MM:SS format)
# - {time_seconds} = Time remaining in seconds
# - {teamRed_coins} = Team Red total coins
# - {teamBlue_coins} = Team Blue total coins
# - {your_team} = Your team number
# - {your_team_coins} = Your team's coins
# - {team_ready} = Is your team ready? (Yes/No)
# - {enemy_team} = Enemy team number
# - {enemy_team_coins} = Enemy team's coins
# - {enemy_team_ready} = Is enemy team ready? (Yes/No)
# - {player_coins} = Your coins
# - {player_kills} = Your total kills
# - {player_lives} = Your remaining lives
# - {player_deaths} = Your deaths this round
# - {kill_streak} = Your current kill streak
# - {round_kills} = Your kills this round
# - {teamRed_alive} = Team Red alive count
# - {teamBlue_alive} = Team Blue alive count
# - {your_team_alive} = Your team's alive count
# - {enemy_team_alive} = Enemy team's alive count
# - {players} = Total players in game
# - {player} = Your player name
# - {online} = Online players (lobby only)
# - {max_online} = Max players (lobby only)
# - {wins} = Your wins (lobby only)
# - {losses} = Your losses (lobby only)
# - {kdr} = Your K/D ratio (lobby only)
# - {kills} = Your total kills (lobby only)
# - {deaths} = Your total deaths (lobby only)
# - {win_rate} = Your win rate % (lobby only)
#
# CTF-specific placeholders:
# - {teamRed_captures} = Team Red flag captures
# - {teamBlue_captures} = Team Blue flag captures
# - {teamRed_capture_circles} = Visual progress circles for Red team
# - {teamBlue_capture_circles} = Visual progress circles for Blue team
# - {red_flag_holder} = Name of Red team flag holder
# - {blue_flag_holder} = Name of Blue team flag holder
#
# PTP-specific placeholders:
# - {red_president} = Name of Red team president
# - {blue_president} = Name of Blue team president
# - {red_assassinations} = Red president assassination count
# - {blue_assassinations} = Blue president assassination count
#
scoreboard:
  # Lobby/Hub scoreboard (shown when not in a game)
  lobby:
    enabled: true
    title: "<gold><bold>Cash Clash</bold></gold>"
    lines:
      - ""
      - "<gray>Player:</gray> <white>{player}"
      - ""
      - "<yellow>Your Stats:</yellow>"
      - "<gray>Wins:</gray> <green>{wins}"
      - "<gray>Losses:</gray> <red>{losses}"
      - "<gray>K/D:</gray> <white>{kdr}"
      - ""
      - "<gray>Kills:</gray> <white>{kills}"
      - "<gray>Deaths:</gray> <white>{deaths}"
      - ""
      - "<gray>Online:</gray> <white>{online}/{max_online}"
      - ""
      - "<yellow>play.cashclash.net</yellow>"

  # Default game scoreboard (standard matches)
  game:
    enabled: true
    title: "<gold><bold>Round {round} - {phase}</bold></gold>"
    lines:
      - ""
      - "<yellow>Time:</yellow> <white>{time}"
      - "<yellow>Phase:</yellow> <white>{phase}"
      - ""
      - "<green>Your Team ({your_team}):</green>"
      - "<gray>Coins:</gray> <white>${your_team_coins}"
      - "<gray>Alive:</gray> <white>{your_team_alive}/4"
      - ""
      - "<red>Enemy Team ({enemy_team}):</red>"
      - "<gray>Coins:</gray> <white>${enemy_team_coins}"
      - "<gray>Alive:</gray> <white>{enemy_team_alive}/4"
      - ""
      - "<aqua>You:</aqua>"
      - "<gray>Coins:</gray> <gold>${player_coins}"
      - "<gray>Lives:</gray> <white>{player_lives}"
      - "<gray>Kills:</gray> <white>{player_kills}"
      - ""
      - "<yellow>play.cashclash.net</yellow>"

  # Capture the Flag gamemode scoreboard
  capture-the-flag:
    enabled: true
    title: "<gold><bold>Capture the Flag</bold></gold>"
    lines:
      - ""
      - "<red>Team Red</red>"
      - "Captures: {teamRed_captures}/2"
      - "Progress: {teamRed_capture_circles}"
      - "Coins: {teamRed_coins}"
      - ""
      - "<blue>Team Blue</blue>"
      - "Captures: {teamBlue_captures}/2"
      - "Progress: {teamBlue_capture_circles}"
      - "Coins: {teamBlue_coins}"
      - ""
      - "<yellow>Phase</yellow>: {phase}"
      - "Time: {time}"
      - ""

  # Protect the President gamemode scoreboard
  protect-the-president:
    enabled: true
    title: "<gold><bold>Protect the President</bold></gold>"
    lines:
      - ""
      - "<red>Team Red</red>"
      - "President: {red_president}"
      - "Assassinations: {red_assassinations}/4"
      - "Coins: {teamRed_coins}"
      - ""
      - "<blue>Team Blue</blue>"
      - "President: {blue_president}"
      - "Assassinations: {blue_assassinations}/4"
      - "Coins: {teamBlue_coins}"
      - ""
      - "<yellow>Phase</yellow>: {phase}"
      - "Time: {time}"
      - ""

# ============================================
# NPC CONFIGURATION
# ============================================
npc:
  # Arena selector NPC (Mannequin)
  arena:
    # Display name shown above the NPC (MiniMessage format)
    display-name: "<gold><bold>Arena Selector</bold></gold>"
    # Skin texture value (base64 encoded)
    # Get custom skins from https://mineskin.org/
    # Leave empty for default Steve skin
    skin-url: "https://textures.minecraft.net/texture/c2e93825cdc4c7ec014143f170ff05ef7ca5f3606716eb5429eb427bb05b7e17"

# ============================================
# REJOIN SETTINGS
# ============================================
rejoin:
  # Enable the rejoin system for disconnected players
  enabled: true
  # How long (seconds) a player has to rejoin after disconnecting
  timeout-seconds: 120
  # Restore player inventory on rejoin
  restore-inventory: true
  # Restore player balance on rejoin
  restore-balance: true


